<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Contacto — NexaTech</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Saltar al contenido</a>
    <div class="page-shell">
      <header class="header">
        <div class="brand"><div class="logo">NEXA</div><div><div class="brand-name">NexaTech</div><div class="muted">Contacto</div></div></div>
        <nav class="nav"><a href="/">Inicio</a><a href="/productos.html">Productos</a><a href="/about.html">Nosotros</a></nav>
      </header>

      <main id="main" class="container">
        <section class="card form-card" aria-labelledby="contact-title">
          <h1 id="contact-title">Contáctanos</h1>

          <form id="contactForm" class="form" novalidate>
            <label for="nombre">Nombre</label>
            <input id="nombre" name="nombre" placeholder="Nombre" required />

            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="tu@correo.com" required />

            <label for="mensaje">Mensaje</label>
            <textarea id="mensaje" name="mensaje" placeholder="Cuéntanos en qué podemos ayudar" rows="6" required></textarea>

            <button class="btn btn-primary" type="submit">Enviar</button>
            <div id="contactStatus" role="status" aria-live="polite" class="muted" style="margin-top:12px"></div>
          </form>
        </section>
      </main>

      <footer class="footer" style="margin-top:28px"><div class="muted">© NexaTech</div></footer>
    </div>

    <script>
    document.getElementById('contactForm').addEventListener('submit', function(e){
      e.preventDefault();
      var status = document.getElementById('contactStatus');
      status.textContent = 'Enviando...';
      setTimeout(function(){ status.textContent = 'Gracias — hemos recibido tu mensaje.'; e.target.reset(); }, 800);
    });
    </script>

    <script src="/js/main.js" defer></script>
  </body>
</html>
