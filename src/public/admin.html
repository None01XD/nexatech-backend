<!doctype html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width,initial-scale=1.0"
  >

  <title>Admin Dashboard — NexaTech</title>

  <link
    rel="stylesheet"
    href="/css/style.css"
  >

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="page-shell">

  <!-- HEADER -->
  <header class="header">

    <div class="brand">

      <div class="logo">
        NEXA
      </div>

      <div>

        <div class="brand-name">
          NexaTech
        </div>

        <div class="muted">
          Dashboard Administrativo
        </div>

      </div>

    </div>

    <div class="actions">

      <button
        id="logoutBtn"
        class="btn btn-secondary"
      >
        Cerrar sesión
      </button>

    </div>

  </header>

  <!-- MAIN -->
  <main class="container">

    <!-- TITLE -->
    <section
      class="section-surface"
      style="margin-top:20px;"
    >

      <h1
        style="
          font-size:2rem;
          margin-bottom:10px;
        "
      >
        Panel Administrativo
      </h1>

      <p class="muted">
        Gestiona productos, ventas e inventario
      </p>

    </section>

    <!-- STATS -->
    <section
      class="grid-4"
      style="
        margin-top:24px;
        margin-bottom:24px;
      "
    >

      <div class="card">
        <h3>Total ventas</h3>
        <h1 id="statSales">0</h1>
      </div>

      <div class="card">
        <h3>Ganancias</h3>
        <h1 id="statRevenue">$0</h1>
      </div>

      <div class="card">
        <h3>Productos</h3>
        <h1 id="statProducts">0</h1>
      </div>

      <div class="card">
        <h3>Agotados</h3>
        <h1 id="statOut">0</h1>
      </div>

    </section>

    <!-- FORM -->
    <section class="section-surface">

      <h2
        style="
          margin-bottom:20px;
        "
      >
        Agregar producto
      </h2>

      <form
        id="productForm"
        class="grid-2"
      >

        <div>

          <label>Nombre</label>

          <input
            type="text"
            id="nombre"
            required
          >

        </div>

        <div>

          <label>Precio</label>

          <input
            type="number"
            id="precio"
            required
          >

        </div>

        <div>

          <label>Cantidad</label>

          <input
            type="number"
            id="cantidad"
            required
          >

        </div>

        <div
          style="
            display:flex;
            align-items:end;
          "
        >

          <button
            class="btn btn-primary"
            type="submit"
            style="width:100%;"
          >
            Guardar producto
          </button>

        </div>

      </form>

    </section>

    <!-- PRODUCTS -->
    <section
      class="section-surface"
      style="margin-top:24px;"
    >

      <h2
        style="
          margin-bottom:20px;
        "
      >
        Productos
      </h2>

      <div
        id="productsGrid"
        class="product-grid"
      ></div>

    </section>

    <!-- SALES -->
    <section
      class="section-surface"
      style="margin-top:24px;"
    >

      <h2
        style="
          margin-bottom:20px;
        "
      >
        Historial de ventas
      </h2>

      <div id="salesTable"></div>

    </section>

    <!-- CHART -->
    <section
      class="section-surface"
      style="margin-top:24px;"
    >

      <h2
        style="
          margin-bottom:20px;
        "
      >
        Ventas
      </h2>

      <canvas id="salesChart"></canvas>

    </section>

    <!-- LOGS -->
    <section
      class="section-surface"
      style="margin-top:24px;"
    >

      <h2
        style="
          margin-bottom:20px;
        "
      >
        Logs del sistema
      </h2>

      <div id="logsTable"></div>

    </section>

  </main>

</div>

<script>

// =========================
// AUTH
// =========================

const token =
  localStorage.getItem('token');

if(!token){

  window.location.href =
    '/login.html';

}

// =========================
// LOGOUT
// =========================

document
  .getElementById('logoutBtn')
  .addEventListener('click', () => {

    localStorage.removeItem('token');

    localStorage.removeItem('user');

    window.location.href =
      '/login.html';

  });

// =========================
// ELEMENTS
// =========================

const grid =
  document.getElementById(
    'productsGrid'
  );

// =========================
// LOAD PRODUCTS
// =========================

async function loadProducts(){

  try {

    const res = await fetch(
      '/api/productos'
    );

    const data =
      await res.json();

    const productos =
      data.productos || [];

    grid.innerHTML = '';

    productos.forEach(p => {

      const card =
        document.createElement('div');

      card.className =
        'card';

      card.innerHTML = `

        <h3>${p.nombre}</h3>

        <p class="muted">
          Precio: $${p.precio}
        </p>

        <p class="muted">
          Stock: ${p.cantidad}
        </p>

        <p
          style="
            margin-top:10px;
            font-weight:bold;
            color:
              ${
                p.status === 'agotado'
                ? '#ff7a7a'
                : '#7aff9d'
              };
          "
        >
          ${p.status.toUpperCase()}
        </p>

        <button
          onclick="deleteProduct(${p.id})"
          class="btn btn-secondary"
          style="
            width:100%;
            margin-top:14px;
          "
        >
          Eliminar
        </button>

        <button
          onclick="restockProduct(${p.id})"
          class="btn btn-primary"
          style="
            width:100%;
            margin-top:10px;
          "
        >
          Reabastecer
        </button>

      `;

      grid.appendChild(card);

    });

  } catch(err){

    console.error(err);

  }

}

// =========================
// CREATE PRODUCT
// =========================

document
  .getElementById('productForm')
  .addEventListener(
    'submit',
    async e => {

      e.preventDefault();

      const nombre =
        document.getElementById('nombre').value;

      const precio =
        Number(
          document.getElementById('precio').value
        );

      const cantidad =
        Number(
          document.getElementById('cantidad').value
        );

      try {

        const res = await fetch(
          '/api/productos',
          {
            method:'POST',

            headers:{
              'Content-Type':
                'application/json'
            },

            body: JSON.stringify({
              nombre,
              precio,
              cantidad
            })
          }
        );

        if(!res.ok){

          throw new Error(
            'Error creando producto'
          );

        }

        e.target.reset();

        await refreshAll();

      } catch(err){

        console.error(err);

        alert(err.message);

      }

    }
  );

// =========================
// DELETE PRODUCT
// =========================

async function deleteProduct(id){

  const ok =
    confirm(
      '¿Eliminar producto?'
    );

  if(!ok) return;

  try {

    const res = await fetch(
      '/api/productos/' + id,
      {
        method:'DELETE'
      }
    );

    if(!res.ok){

      throw new Error(
        'Error eliminando'
      );

    }

    await refreshAll();

  } catch(err){

    console.error(err);

  }

}

window.deleteProduct =
  deleteProduct;

// =========================
// RESTOCK
// =========================

async function restockProduct(id){

  const amount =
    prompt(
      'Cantidad a agregar:'
    );

  if(!amount) return;

  try {

    const res = await fetch(
      '/api/inventory/restock/' + id,
      {
        method:'POST',

        headers:{
          'Content-Type':
            'application/json',

          Authorization:
            'Bearer ' + token
        },

        body: JSON.stringify({
          amount:Number(amount)
        })
      }
    );

    const data =
      await res.json();

    if(!res.ok){

      throw new Error(
        data.message
      );

    }

    alert(
      'Stock actualizado 😎'
    );

    await refreshAll();

  } catch(err){

    console.error(err);

    alert(err.message);

  }

}

window.restockProduct =
  restockProduct;

// =========================
// LOAD STATS
// =========================

async function loadStats(){

  try {

    const res = await fetch(
      '/api/admin/stats',
      {
        headers:{
          Authorization:
            'Bearer ' + token
        }
      }
    );

    const data =
      await res.json();

    document.getElementById(
      'statSales'
    ).textContent =
      data.totalSales;

    document.getElementById(
      'statRevenue'
    ).textContent =
      '$' + data.revenue;

    document.getElementById(
      'statProducts'
    ).textContent =
      data.totalProducts;

    document.getElementById(
      'statOut'
    ).textContent =
      data.outOfStock;

  } catch(err){

    console.error(err);

  }

}

// =========================
// LOAD SALES
// =========================

async function loadSales(){

  try {

    const res = await fetch(
      '/api/admin/sales',
      {
        headers:{
          Authorization:
            'Bearer ' + token
        }
      }
    );

    const sales =
      await res.json();

    const container =
      document.getElementById(
        'salesTable'
      );

    if(!sales.length){

      container.innerHTML = `
        <div class="muted">
          No hay ventas aún
        </div>
      `;

      return;

    }

    container.innerHTML = `
      <table
        style="
          width:100%;
          border-collapse:collapse;
        "
      >
        <thead>

          <tr>

            <th>ID</th>
            <th>Total</th>
            <th>Fecha</th>

          </tr>

        </thead>

        <tbody>

          ${sales.map(s => `
            <tr>

              <td>#${s.id}</td>

              <td>$${s.total}</td>

              <td>
                ${new Date(
                  s.created_at
                ).toLocaleString()}
              </td>

            </tr>
          `).join('')}

        </tbody>
      </table>
    `;

  } catch(err){

    console.error(err);

  }

}

// =========================
// LOAD CHART
// =========================

let salesChart = null;

async function loadChart(){

  try {

    const res = await fetch(
      '/api/admin/sales',
      {
        headers:{
          Authorization:
            'Bearer ' + token
        }
      }
    );

    const sales =
      await res.json();

    const labels =
      sales.map(s => '#' + s.id);

    const totals =
      sales.map(s =>
        Number(s.total)
      );

    const ctx =
      document.getElementById(
        'salesChart'
      );

    if(salesChart){

      salesChart.destroy();

    }

    salesChart =
      new Chart(ctx, {

        type:'line',

        data:{

          labels,

          datasets:[{

            label:'Ventas',

            data:totals,

            tension:0.3

          }]

        },

        options:{

          responsive:true

        }

      });

  } catch(err){

    console.error(err);

  }

}

// =========================
// LOAD LOGS
// =========================

async function loadLogs(){

  try {

    const res = await fetch(
      '/api/admin/logs',
      {
        headers:{
          Authorization:
            'Bearer ' + token
        }
      }
    );

    const logs =
      await res.json();

    const container =
      document.getElementById(
        'logsTable'
      );

    if(!logs.length){

      container.innerHTML = `
        <div class="muted">
          No hay logs
        </div>
      `;

      return;

    }

    container.innerHTML = `
      <table
        style="
          width:100%;
          border-collapse:collapse;
        "
      >
        <thead>

          <tr>

            <th>Acción</th>
            <th>Detalles</th>
            <th>Fecha</th>

          </tr>

        </thead>

        <tbody>

          ${logs.map(log => `
            <tr>

              <td>${log.action}</td>

              <td>${log.details}</td>

              <td>
                ${new Date(
                  log.created_at
                ).toLocaleString()}
              </td>

            </tr>
          `).join('')}

        </tbody>
      </table>
    `;

  } catch(err){

    console.error(err);

  }

}

// =========================
// REFRESH ALL
// =========================

async function refreshAll(){

  await loadProducts();

  await loadStats();

  await loadSales();

  await loadChart();

  await loadLogs();

}

// =========================
// INIT
// =========================

refreshAll();

</script>

</body>
</html>
